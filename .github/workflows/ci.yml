name: CI — Lint, Test, Train

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || \
          pip install lightgbm pandas numpy scikit-learn scikit-uplift \
            scipy fastapi uvicorn pydantic pandera pyarrow httpx pytest \
            matplotlib seaborn optuna
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  train:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install lightgbm pandas numpy scikit-learn scikit-uplift \
            scipy fastapi uvicorn pydantic pandera pyarrow matplotlib \
            seaborn optuna
      - name: Run full pipeline
        run: python main.py --n-clients 5000 --n-purchases 100000
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: artifacts/
